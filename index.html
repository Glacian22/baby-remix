<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <!-- <link rel="icon" type="image/svg+xml" href="/vite.svg" /> -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./src/assets/fonts/stylesheet.css" type="text/css" charset="utf-8"/>
  <title>Baby Name Mixer</title>
</head>

<body>
  <!-- Hidden static form so Netlify Forms detects "shortlist" at deploy time.
       The React EmailCapture component submits to it via fetch (no backend needed). -->
  <form name="shortlist" netlify netlify-honeypot="bot-field" hidden>
    <input type="email" name="email" />
    <textarea name="names"></textarea>
  </form>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-bootstrap@next/dist/react-bootstrap.min.js" crossorigin></script>
</body>

</html>
